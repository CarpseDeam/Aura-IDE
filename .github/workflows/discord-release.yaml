name: Discord Release Announcement

on:
  release:
    types: [published]

jobs:
  announce:
    if: ${{ !github.event.release.prerelease && !github.event.release.draft }}
    runs-on: ubuntu-latest

    steps:
      - name: Post release to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_RELEASE_WEBHOOK_URL }}
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          RELEASE_BODY: ${{ github.event.release.body }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys
          import urllib.error
          import urllib.request

          webhook_url = os.environ.get("DISCORD_WEBHOOK_URL", "").strip()
          if not webhook_url:
              raise SystemExit("Missing DISCORD_RELEASE_WEBHOOK_URL repo secret")

          tag = os.environ.get("RELEASE_TAG", "").strip()
          title = os.environ.get("RELEASE_NAME", "").strip() or tag or "New Aura-IDE release"
          url = os.environ["RELEASE_URL"]
          body = (os.environ.get("RELEASE_BODY") or "").strip()

          if len(body) > 1000:
              body = body[:997] + "..."

          payload = {
              "username": "Aura Release Bot",
              "allowed_mentions": {"parse": []},
              "content": f"✨ **Aura-IDE {tag} is live**\n{url}",
              "embeds": [
                  {
                      "title": title,
                      "url": url,
                      "description": body or "Fresh build out of the forge.",
                  }
              ],
          }

          data = json.dumps(payload).encode("utf-8")
          req = urllib.request.Request(
              webhook_url,
              data=data,
              headers={
                  "Content-Type": "application/json",
                  "User-Agent": "Aura-IDE Release Bot (GitHub Actions)",
              },
              method="POST",
          )

          try:
              with urllib.request.urlopen(req, timeout=15) as response:
                  pass
          except urllib.error.HTTPError as e:
              body_text = e.read()
              if isinstance(body_text, bytes):
                  body_text = body_text.decode("utf-8", errors="replace")
              print(f"Discord webhook error response: {body_text}")
              raise SystemExit(f"Discord webhook returned HTTP {e.code}")
          except urllib.error.URLError as e:
              print(f"Discord webhook connection error: {e.reason}")
              sys.exit(1)
          PY

