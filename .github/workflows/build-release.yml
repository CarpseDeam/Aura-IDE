name: Build and Release

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Run Tests
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run Ruff Lint
        run: |
          ruff check .

      - name: Run Tests
        run: |
          pytest

  build:
    name: Build Windows Executable
    needs: test
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Build with Nuitka
        run: |
          # Use 2 jobs as standard GitHub runners have 2 cores.
          # Use --no-copy-desktop to avoid trying to copy to a desktop folder that doesn't exist.
          python scripts/build_nuitka.py --skip-version-update --no-copy-desktop --jobs=2

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Aura-Windows-x64
          path: build/Aura-Windows-x64.zip
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: Aura-Windows-x64
          path: ./release-assets

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/Aura-Windows-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
