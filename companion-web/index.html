<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0d14" />
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Aura Companion">
    <link rel="icon" type="image/svg+xml" href="/icon-192.svg">
    <link rel="apple-touch-icon" href="/icon-192.svg">
    <title>Aura Companion</title>
    <style>
      :root {
        --bg: #0a0d14;
        --bg-elev: #11141d;
        --bg-glass: rgba(20, 24, 34, 0.72);
        --bg-card: rgba(22, 28, 40, 0.65);
        --border: rgba(120, 138, 175, 0.14);
        --border-strong: rgba(120, 138, 175, 0.28);
        --fg: #e7ebf3;
        --fg-dim: #a8aebb;
        --fg-muted: #6e7382;
        --accent: #7aa2f7;
        --accent-hover: #94b6ff;
        --accent-glow: rgba(122, 162, 247, 0.32);
        --success: #9ece6a;
        --warn: #e0af68;
        --danger: #f7768e;
        --user-bubble: #1d2740;
        --assistant-bubble: #161a24;
        --radius: 14px;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root {
        height: 100%;
        overscroll-behavior: none;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
        background: var(--bg);
        background-image:
          radial-gradient(1200px 600px at 50% -10%, rgba(122,162,247,0.10), transparent 65%),
          radial-gradient(900px 500px at -10% 110%, rgba(157,124,216,0.07), transparent 70%);
        color: var(--fg);
        -webkit-font-smoothing: antialiased;
        -webkit-tap-highlight-color: transparent;
        overflow: hidden;
      }
      button, input, textarea {
        font: inherit;
        color: inherit;
      }
      button { cursor: pointer; }
      input::placeholder { color: var(--fg-muted); }

      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-thumb { background: rgba(168,174,187,0.18); border-radius: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }

      @keyframes pulse {
        0%, 100% { opacity: 0.35; }
        50%      { opacity: 1; }
      }
      @keyframes fade-in {
        from { opacity: 0; transform: translateY(4px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .fade-in { animation: fade-in 220ms ease-out; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
